<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viết bài mới - MDLand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-primary { background-color: #1e40af; }
    </style>
</head>
<body class="bg-gray-50 flex">

    <!-- Sidebar -->
    <aside class="w-64 h-screen bg-gray-900 text-white fixed">
        <div class="p-6 border-b border-gray-800">
            <h1 class="text-xl font-bold tracking-wider text-blue-400">MD ADMIN</h1>
            <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Vùng Đất Cấm 6868</p>
        </div>
        <nav class="mt-6">
            <a th:href="@{/mdadmin-vung-dat-cam-6868(key=${key})}" class="flex items-center px-6 py-3 text-gray-400 hover:bg-gray-800 hover:text-white transition-colors">
                <span class="mr-3">🏠</span> Bất động sản
            </a>
            <a th:href="@{/mdadmin-vung-dat-cam-6868/news(key=${key})}" class="flex items-center px-6 py-3 bg-primary text-white">
                <span class="mr-3">📰</span> Tin tức nhà đất
            </a>
            <a href="/" class="flex items-center px-6 py-3 text-gray-400 hover:bg-gray-800 hover:text-white transition-colors border-t border-gray-800 mt-6">
                <span class="mr-3">🌐</span> Xem Website
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 flex-grow p-10">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-2xl font-bold text-gray-800 mb-8">Viết bài mới</h2>

            <form th:action="@{/mdadmin-vung-dat-cam-6868/news/save}" th:object="${post}" method="POST" enctype="multipart/form-data" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 space-y-6">
                <input type="hidden" name="key" th:value="${key}">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{imagesJson}">
                
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Tiêu đề bài viết</label>
                        <input type="text" th:field="*{title}" required placeholder="Ví dụ: Xu hướng đất nền 2024..."
                               id="title" oninput="generateSlug()"
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-blue-100 transition-all outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Đường dẫn (Slug)</label>
                        <input type="text" th:field="*{slug}" required placeholder="xu-huong-dat-nen-2024"
                               id="slug"
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-blue-100 transition-all outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Ảnh đại diện bài viết (URL)</label>
                        <input type="text" th:field="*{thumbnailUrl}" placeholder="https://..."
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-blue-100 transition-all outline-none">
                        <p class="text-[10px] text-gray-400 mt-1">* Nếu để trống, hệ thống sẽ tự lấy ảnh đầu tiên tải lên làm đại diện.</p>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Tải ảnh mới từ máy tính (Nhiều ảnh)</label>
                        <div class="relative">
                            <input type="file" name="imageFiles" id="imageFiles" multiple accept="image/*"
                                   onchange="previewImages()" class="hidden">
                            <label for="imageFiles" 
                                   class="flex items-center justify-center w-full px-4 py-3 bg-gray-50 border-2 border-dashed border-gray-200 rounded-xl cursor-pointer hover:bg-gray-100 hover:border-primary transition-all">
                                <span class="text-sm font-medium text-gray-600">📸 Chọn nhiều ảnh...</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div id="imagePreview" class="grid grid-cols-4 md:grid-cols-6 gap-4">
                    <th:block th:if="*{imagesJson != null && !imagesJson.isEmpty()}">
                        <div th:each="url : ${#strings.arraySplit(post.imagesJson, ',')}" class="relative aspect-square rounded-lg overflow-hidden border border-gray-100 bg-gray-50 group">
                            <img th:src="${url}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                <span class="text-[8px] text-white font-bold uppercase">Đã lưu</span>
                            </div>
                        </div>
                    </th:block>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Nội dung chi tiết</label>
                    <textarea th:field="*{content}" rows="15" placeholder="Viết nội dung bài viết tại đây..."
                              class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-blue-100 transition-all outline-none"></textarea>
                </div>

                <div class="pt-4 flex items-center justify-end space-x-4">
                    <a th:href="@{/mdadmin-vung-dat-cam-6868/news(key=${key})}" class="text-gray-500 font-semibold hover:text-gray-700">Hủy bỏ</a>
                    <button type="submit" class="bg-primary text-white px-10 py-3 rounded-xl font-bold hover:bg-blue-800 transition-all shadow-lg shadow-blue-200">
                        Đăng bài viết
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script th:inline="javascript">
        function generateSlug() {
            const title = document.getElementById('title').value;
            let slug = title.toLowerCase();
            slug = slug.normalize('NFD').replace(/[\u0300-\u036f]/g, "");
            slug = slug.replace(/[^a-z0-9]/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "");
            document.getElementById('slug').value = slug;
        }

        function previewImages() {
            const preview = document.getElementById('imagePreview');
            const files = document.getElementById('imageFiles').files;
            preview.innerHTML = '';
            if (files) {
                [].forEach.call(files, file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const div = document.createElement('div');
                        div.className = 'relative aspect-square rounded-lg overflow-hidden border border-gray-100 bg-gray-50';
                        div.innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                        preview.appendChild(div);
                    }
                    reader.readAsDataURL(file);
                });
            }
        }
    </script>

</body>
</html>
